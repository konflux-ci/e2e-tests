---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mirror-setup-script
  namespace: default
data:
  setup.sh: |
    #!/bin/bash
    set -e

    QUAY_IP="$1"
    GHCR_IP="$2"
    CGR_IP="$3"
    REDHAT_IP="$4"

    # Create mirror directories
    mkdir -p /etc/containerd/certs.d/quay.io
    mkdir -p /etc/containerd/certs.d/ghcr.io
    mkdir -p /etc/containerd/certs.d/cgr.dev
    mkdir -p /etc/containerd/certs.d/registry.access.redhat.com

    # quay.io mirror
    cat > /etc/containerd/certs.d/quay.io/hosts.toml <<TOML
    server = "https://quay.io"

    [host."http://${QUAY_IP}:5000"]
      capabilities = ["pull", "resolve"]

    [host."https://quay.io"]
      capabilities = ["pull", "resolve"]
    TOML

    # ghcr.io mirror
    cat > /etc/containerd/certs.d/ghcr.io/hosts.toml <<TOML
    server = "https://ghcr.io"

    [host."http://${GHCR_IP}:5000"]
      capabilities = ["pull", "resolve"]

    [host."https://ghcr.io"]
      capabilities = ["pull", "resolve"]
    TOML

    # cgr.dev mirror
    cat > /etc/containerd/certs.d/cgr.dev/hosts.toml <<TOML
    server = "https://cgr.dev"

    [host."http://${CGR_IP}:5000"]
      capabilities = ["pull", "resolve"]

    [host."https://cgr.dev"]
      capabilities = ["pull", "resolve"]
    TOML

    # registry.access.redhat.com mirror
    cat > /etc/containerd/certs.d/registry.access.redhat.com/hosts.toml <<TOML
    server = "https://registry.access.redhat.com"

    [host."http://${REDHAT_IP}:5000"]
      capabilities = ["pull", "resolve"]

    [host."https://registry.access.redhat.com"]
      capabilities = ["pull", "resolve"]
    TOML

    # Enable certs.d config path in containerd if not already set
    if ! grep -q 'config_path' /etc/containerd/config.toml; then
      sed -i 's|\[plugins."io.containerd.grpc.v1.cri".registry\]|[plugins."io.containerd.grpc.v1.cri".registry]\n      config_path = "/etc/containerd/certs.d"|' /etc/containerd/config.toml
    fi

    # Increase concurrent downloads
    if ! grep -q 'max_concurrent_downloads' /etc/containerd/config.toml; then
      sed -i 's|\[plugins."io.containerd.grpc.v1.cri"\]|[plugins."io.containerd.grpc.v1.cri"]\n    max_concurrent_downloads = 20|' /etc/containerd/config.toml
    fi

    # Restart containerd to apply changes
    systemctl restart containerd
    sleep 3
    echo "DONE - mirrors configured and containerd restarted"
