version: "2"
linters:
  enable:
    - ginkgolinter
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - path: (.+)\.go$
        text: composites
      # Allow dot imports (Ginkgo/Gomega DSL) when file has //nolint:staticcheck
      - linters: [staticcheck]
        text: "ST1001:"
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
